<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <header class="header">
        <h1>Welcome to the Course Registration System</h1>
    </header>

    <div class="container">
        <div class="card">

            <h2>Student Registration</h2>

            <form action="#" method="post">

                <label>Full Name</label><br>
                <input type="text" name="name" placeholder="Enter your full name" required><br><br>

                <label>User ID</label><br>
                <input type="text" name="userid" placeholder="Create a User ID" required><br><br>

                <label>Phone Number</label><br>
                <input type="tel" name="phone" placeholder="Enter phone number" required><br><br>

                <label>Password</label><br>
                <input type="password" name="password" placeholder="Create a password" required><br><br>

                <button type="submit">Register</button>

            </form>

            <p>
                Already have an account?
                <a href="login.html">Login</a>
            </p>

        </div>
    </div>

</body>
</html>
